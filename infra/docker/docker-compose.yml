version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: musicaas
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    ports: ["5432:5432"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  backend:
    build: ../../apps/backend
    ports: ["3001:3001"]
    env_file: ../../.env
    depends_on: [postgres, redis]

  worker:
    build: ../../apps/worker
    env_file: ../../.env
    depends_on: [redis, backend]

  frontend:
    build: ../../apps/frontend
    ports: ["3000:3000"]
    env_file: ../../.env